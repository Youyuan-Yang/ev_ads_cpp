rear_perception_node:
  ros__parameters:
    # 后置鱼眼校正默认关闭；填入真实标定参数后再打开。
    fisheye_undistort: false

    # OpenCV fisheye 模型内参：[fx, fy, cx, cy]。
    # 下面只是 1920x1080 的占位示例，不可直接当作实车标定值。
    fisheye_k: [700.0, 700.0, 960.0, 540.0]

    # OpenCV fisheye 模型畸变：[k1, k2, k3, k4]。
    # 必须通过棋盘格/圆点板标定得到。
    fisheye_d: [0.0, 0.0, 0.0, 0.0]

    # 0 保留中心精度，1 保留更多边缘视场。
    fisheye_balance: 0.25

    # 大于 1 会缩小有效视场，小于 1 会保留更多边缘但黑边更多。
    fisheye_fov_scale: 1.0
