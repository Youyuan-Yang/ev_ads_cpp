name: front_sensor_lost
description: 前向摄像头超时，系统 degraded，禁止 L3 制动。
duration_s: 5.0
events:
  - t: 0.0
    front: {health: 3}             # DISCONNECTED
  - t: 1.0
    driver: {face_visible: 1, eye_closure_ratio: 0.85, head_pitch_rad: 0.5}
  - t: 2.0
    rear_zones: [-1, -1, 2.5, 0, 0, 5]
assertions:
  brake_enable_must_be_false: true
  reason_contains: "front_cam_down"
