name: rear_right_blindspot_turn
description: 右后目标逼近 + IMU 右转倾向，期望 L2，禁止制动。
duration_s: 6.0
events:
  - t: 0.0
    rear_zones: [-1, -1, 8, 0, 0, 2]   # 右后 8m, 2 m/s
  - t: 2.0
    rear_zones: [-1, -1, 5, 0, 0, 3]
  - t: 4.0
    rear_zones: [-1, -1, 3, 0, 0, 4]
    imu: {yaw_rate: -0.6}
assertions:
  max_level_at_least: 2
  max_level_at_most: 2
  brake_enable_must_be_false: true
